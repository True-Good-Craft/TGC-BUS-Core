name: Release Mirror

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to mirror (example: v1.0.4)"
        required: false
      tooling_ref:
        description: "Repository ref to checkout for workflow tooling during manual runs"
        required: false
        default: "main"
      tag:
        description: "Deprecated manual fallback for release_tag"
        required: false

permissions:
  contents: read

env:
  RELEASE_PUBLIC_BASE_URL: https://lighthouse.buscore.ca

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tooling_ref || github.event.release.tag_name || github.sha }}

      - name: Install Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Install manifest signing dependencies
        run: python3 -m pip install "cryptography>=46.0.0"

      - name: Determine release tag and version
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.release_tag || github.event.inputs.tag }}"

          if [ -z "$TAG" ]; then
            echo "::error::No release tag provided."
            echo "Run this workflow from a release or supply workflow_dispatch input release_tag."
            exit 1
          fi

          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "::error::Release tag ${TAG} must match strict external SemVer form vX.Y.Z."
              exit 1
              ;;
          esac

          CANONICAL_VERSION="${TAG#v}"

          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION_FROM_REPO=$(python3 - <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("core/version.py").read_text(encoding="utf-8")
          match = re.search(r'^VERSION\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"\s*$', text, re.MULTILINE)
          if not match:
              print("Failed to read strict SemVer VERSION from core/version.py.", file=sys.stderr)
              sys.exit(1)
          print(match.group(1))
          PY
            )

            EXPECTED_TAG="v${VERSION_FROM_REPO}"
            if [ "${TAG}" != "${EXPECTED_TAG}" ]; then
              echo "::error::Release tag ${TAG} does not match core/version.py VERSION ${VERSION_FROM_REPO}."
              exit 1
            fi

            CANONICAL_VERSION="${VERSION_FROM_REPO}"
          fi

          echo "RAW_TAG=$TAG" >> "$GITHUB_ENV"
          echo "CANONICAL_VERSION=${CANONICAL_VERSION}" >> "$GITHUB_ENV"
          echo "EXPECTED_ASSET_NAME=BUS-Core-${CANONICAL_VERSION}.zip" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_URL=https://github.com/${{ github.repository }}/releases/tag/${TAG}" >> "$GITHUB_ENV"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$RAW_TAG" \
            --pattern "$EXPECTED_ASSET_NAME" \
            --dir ./release-assets

          MATCH_COUNT=$(find ./release-assets -name "$EXPECTED_ASSET_NAME" -type f | wc -l)

          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "::error::No matching release asset found ($EXPECTED_ASSET_NAME)"
            exit 1
          fi

          if [ "$MATCH_COUNT" -gt 1 ]; then
            echo "::error::Multiple matching assets found; expected exactly one"
            exit 1
          fi

          ASSET_FILE=$(find ./release-assets -name "$EXPECTED_ASSET_NAME" -type f)

          echo "ASSET_FILE=${ASSET_FILE}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$(basename "${ASSET_FILE}")" >> "$GITHUB_ENV"

      - name: Compute SHA256 checksum and metadata
        run: |
          SHA256=$(sha256sum "$ASSET_FILE" | awk '{ print $1 }')
          SIZE_BYTES=$(wc -c < "$ASSET_FILE")

          echo "ASSET_SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "ASSET_SIZE_BYTES=${SIZE_BYTES}" >> "$GITHUB_ENV"

      - name: Upload artifact to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler r2 object put --remote \
            "${{ secrets.R2_BUCKET }}/releases/$ASSET_NAME" \
            --file "$ASSET_FILE"

      - name: Generate manifest (stable.json)
        env:
          MIN_SUPPORTED_VERSION: ${{ vars.MIN_SUPPORTED_VERSION }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MIN_SUPPORTED="${MIN_SUPPORTED_VERSION:-$CANONICAL_VERSION}"
          RELEASES_BASE_URL="${{ env.RELEASE_PUBLIC_BASE_URL }}/releases"

          RELEASES_JSON=$(gh api "repos/${{ github.repository }}/releases?per_page=10" 2>/dev/null || echo "[]")

          HISTORY_JSON=$(echo "$RELEASES_JSON" | jq -c \
            --arg current_tag "$RAW_TAG" \
            --arg current_sha256 "$ASSET_SHA256" \
            --arg releases_base_url "$RELEASES_BASE_URL" \
            '[
              .[] |
              . as $release |
              ($release.assets | map(select((.name | startswith("BUS-Core-")) and (.name | endswith(".zip")))) | .[0]) as $asset |
              if $asset then
                {
                  version: ($release.tag_name | ltrimstr("v")),
                  url: ($releases_base_url + "/" + $asset.name),
                  release_notes_url: $release.html_url,
                  size_bytes: $asset.size
                } +
                if $release.tag_name == $current_tag then { sha256: $current_sha256 } else {} end
              else empty
              end
            ] | .[0:5]')

          jq -n \
            --arg min_supported "$MIN_SUPPORTED" \
            --arg version "$CANONICAL_VERSION" \
            --arg release_notes_url "$RELEASE_NOTES_URL" \
            --argjson size_bytes "$ASSET_SIZE_BYTES" \
            --arg download_url "$RELEASES_BASE_URL/$ASSET_NAME" \
            --arg sha256 "$ASSET_SHA256" \
            --argjson history "$HISTORY_JSON" \
            '{
              min_supported: $min_supported,
              latest: {
                version: $version,
                release_notes_url: $release_notes_url,
                size_bytes: $size_bytes,
                download: {
                  url: $download_url,
                  sha256: $sha256,
                  size_bytes: $size_bytes
                }
              },
              history: $history
            }' \
            > stable.json

      - name: Debug manifest signing tooling
        run: |
          pwd
          ls -la scripts

          if [ ! -f scripts/sign_manifest.py ]; then
            echo "::error::Missing scripts/sign_manifest.py in the checked out repository ref. For workflow_dispatch backfills, set tooling_ref to a branch or ref that contains the current signing tooling."
            exit 1
          fi

      - name: Sign manifest
        env:
          BUSCORE_MANIFEST_SIGNING_PRIVATE_KEY: ${{ secrets.BUSCORE_MANIFEST_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${BUSCORE_MANIFEST_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::BUSCORE_MANIFEST_SIGNING_PRIVATE_KEY secret is required to publish a signed manifest."
            exit 1
          fi

          python3 scripts/sign_manifest.py stable.json stable.signed.json \
            --key-id bus-core-prod-ed25519-2026-04-25 \
            --private-key-env BUSCORE_MANIFEST_SIGNING_PRIVATE_KEY

      - name: Verify signed manifest
        run: |
          jq -e \
            --arg expected_version "$CANONICAL_VERSION" \
            --arg expected_url "${{ env.RELEASE_PUBLIC_BASE_URL }}/releases/$ASSET_NAME" \
            '.latest.version == $expected_version
              and .latest.download.url == $expected_url
              and .signature.alg == "Ed25519"
              and .signature.key_id == "bus-core-prod-ed25519-2026-04-25"' \
            stable.signed.json > /dev/null

          python3 - <<'PY'
          import json
          import pathlib

          from core.runtime.manifest_keys import active_manifest_public_keys
          from core.runtime.manifest_trust import verify_embedded_manifest_signature

          manifest = json.loads(pathlib.Path("stable.signed.json").read_text(encoding="utf-8"))
          unsigned = verify_embedded_manifest_signature(
              manifest,
              trusted_public_keys=active_manifest_public_keys(),
          )
          assert unsigned["latest"]["version"]
          assert unsigned["latest"]["download"]["url"]
          PY

      - name: Upload manifest to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          wrangler r2 object put --remote \
            "${{ secrets.R2_BUCKET }}/manifest/core/stable.json" \
            --file stable.signed.json \
            --content-type "application/json"
