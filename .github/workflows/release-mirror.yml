name: Release Mirror

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.2)"
        required: false

permissions:
  contents: read

env:
  RELEASE_PUBLIC_BASE_URL: https://lighthouse.buscore.ca

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || github.sha }}

      - name: Install Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Determine release tag
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"

          if [ -z "$TAG" ]; then
            echo "::error::No release tag provided."
            echo "Run this workflow from a release or supply a tag manually."
            exit 1
          fi

          echo "RAW_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Read canonical release version
        run: |
          CANONICAL_VERSION=$(python3 - <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("core/version.py").read_text(encoding="utf-8")
          match = re.search(r'^VERSION\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"\s*$', text, re.MULTILINE)
          if not match:
              print("Failed to read strict SemVer VERSION from core/version.py.", file=sys.stderr)
              sys.exit(1)
          print(match.group(1))
          PY
          )

          EXPECTED_TAG="v${CANONICAL_VERSION}"
          if [ "${RAW_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Release tag ${RAW_TAG} does not match core/version.py VERSION ${CANONICAL_VERSION}."
            exit 1
          fi

          echo "CANONICAL_VERSION=${CANONICAL_VERSION}" >> "$GITHUB_ENV"
          echo "EXPECTED_ASSET_NAME=BUS-Core-${CANONICAL_VERSION}.zip" >> "$GITHUB_ENV"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ env.RAW_TAG }}" \
            --pattern "${{ env.EXPECTED_ASSET_NAME }}" \
            --dir ./release-assets

          MATCH_COUNT=$(find ./release-assets -name "${{ env.EXPECTED_ASSET_NAME }}" -type f | wc -l)

          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "::error::No matching release asset found (${{ env.EXPECTED_ASSET_NAME }})"
            exit 1
          fi

          if [ "$MATCH_COUNT" -gt 1 ]; then
            echo "::error::Multiple matching assets found; expected exactly one"
            exit 1
          fi

          ASSET_FILE=$(find ./release-assets -name "${{ env.EXPECTED_ASSET_NAME }}" -type f)

          echo "ASSET_FILE=${ASSET_FILE}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$(basename "${ASSET_FILE}")" >> "$GITHUB_ENV"

      - name: Compute SHA256 checksum and metadata
        run: |
          SHA256=$(sha256sum "${{ env.ASSET_FILE }}" | awk '{ print $1 }')
          SIZE_BYTES=$(wc -c < "${{ env.ASSET_FILE }}")

          echo "ASSET_SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "ASSET_SIZE_BYTES=${SIZE_BYTES}" >> "$GITHUB_ENV"

      - name: Upload artifact to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler r2 object put --remote \
            "${{ secrets.R2_BUCKET }}/releases/${{ env.ASSET_NAME }}" \
            --file "${{ env.ASSET_FILE }}"

      - name: Generate manifest (stable.json)
        env:
          MIN_SUPPORTED_VERSION: ${{ vars.MIN_SUPPORTED_VERSION }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MIN_SUPPORTED="${MIN_SUPPORTED_VERSION:-${{ env.CANONICAL_VERSION }}}"
          RELEASES_BASE_URL="${{ env.RELEASE_PUBLIC_BASE_URL }}/releases"

          RELEASES_JSON=$(gh api "repos/${{ github.repository }}/releases?per_page=10" 2>/dev/null || echo "[]")

          HISTORY_JSON=$(echo "$RELEASES_JSON" | jq -c \
            --arg current_tag "${{ env.RAW_TAG }}" \
            --arg current_sha256 "${{ env.ASSET_SHA256 }}" \
            --arg releases_base_url "$RELEASES_BASE_URL" \
            '[
              .[] |
              . as $release |
              ($release.assets | map(select((.name | startswith("BUS-Core-")) and (.name | endswith(".zip")))) | .[0]) as $asset |
              if $asset then
                {
                  version: ($release.tag_name | ltrimstr("v")),
                  url: ($releases_base_url + "/" + $asset.name),
                  release_notes_url: $release.html_url,
                  size_bytes: $asset.size
                } +
                if $release.tag_name == $current_tag then { sha256: $current_sha256 } else {} end
              else empty
              end
            ] | .[0:5]')

          jq -n \
            --arg min_supported "$MIN_SUPPORTED" \
            --arg version "${{ env.CANONICAL_VERSION }}" \
            --arg release_notes_url "https://github.com/${{ github.repository }}/releases/tag/${{ env.RAW_TAG }}" \
            --argjson size_bytes "${{ env.ASSET_SIZE_BYTES }}" \
            --arg download_url "$RELEASES_BASE_URL/${{ env.ASSET_NAME }}" \
            --arg sha256 "${{ env.ASSET_SHA256 }}" \
            --argjson history "$HISTORY_JSON" \
            '{
              min_supported: $min_supported,
              latest: {
                version: $version,
                release_notes_url: $release_notes_url,
                size_bytes: $size_bytes,
                download: {
                  url: $download_url,
                  sha256: $sha256,
                  size_bytes: $size_bytes
                }
              },
              history: $history
            }' \
            > stable.json

      - name: Upload manifest to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          wrangler r2 object put --remote \
            "${{ secrets.R2_BUCKET }}/manifest/core/stable.json" \
            --file stable.json \
            --content-type "application/json"
