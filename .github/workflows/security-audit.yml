name: Security Audit

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Bandit full report, Low+ advisory
        continue-on-error: true
        run: |
          bandit -r core tgc scripts launcher.py \
            -x "tests,build,dist,.venv,.pytest_cache,.tmp_test_deps_*,.tmp_localappdata_*,.artifacts" \
            --severity-level low \
            --confidence-level low

      - name: Bandit blocking scan, Medium/High
        run: |
          bandit -r core tgc scripts launcher.py \
            -x "tests,build,dist,.venv,.pytest_cache,.tmp_test_deps_*,.tmp_localappdata_*,.artifacts" \
            --severity-level medium \
            --confidence-level low

      - name: Dependency audit, requirements advisory
        continue-on-error: true
        run: |
          echo "::notice::pip-audit runs against range-based requirements.txt in advisory mode until BUS Core has a lockfile or fully pinned audit input."
          pip-audit -r requirements.txt --progress-spinner off
